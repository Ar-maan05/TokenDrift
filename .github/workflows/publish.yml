name: Publish to PyPI

on:
  push:
    tags:
      - "v*"  # triggers on v0.1.0, v1.0.0, etc.

permissions:
  contents: read
  id-token: write  # required for OIDC Trusted Publisher

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi  # set this up in GitHub repo Settings → Environments

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC Trusted Publisher — no API token needed.
        # Configure a Trusted Publisher at:
        #   https://pypi.org/manage/project/tokendrift/settings/publishing/
        # with:
        #   Owner:      Ar-maan05
        #   Repository: tokendrift (or TokenDrift)
        #   Workflow:   publish.yml
        #   Environment: pypi

  publish-testpypi:
    name: Publish to TestPyPI (dry run)
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi  # optional — remove if you don't need TestPyPI
    if: false  # flip to true to test a release on TestPyPI first

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
